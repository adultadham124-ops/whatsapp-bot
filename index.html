<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laguna Dubai — Menu</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold: #e0263c;
  --gold2: #ff8a93;
  --navy: #111111;
  --green: #25d366;
  --red: #e0263c;
}
body {
  font-family: 'Cairo', sans-serif;
  background: #0f0f0f;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* ═══ HERO ═══ */
.hero {
  position: relative;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 40px 20px 30px;
}
.hero-bg {
  position: absolute; inset: 0;
  background-image: url('https://images.unsplash.com/photo-1559305616-3f99cd43e353?w=600&fit=crop');
  background-size: cover;
  background-position: center;
  filter: brightness(0.35);
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.8) 100%);
}
.hero-content { position: relative; z-index: 2; text-align: center; width: 100%; }

/* Logo */
.logo-svg { width: 64px; height: 64px; margin: 0 auto 10px; display: block; }
.brand { font-size: 2.6rem; font-weight: 900; letter-spacing: 0.2em; color: var(--gold); line-height:1; }
.brand-sub { font-size: 0.72rem; letter-spacing: 0.3em; color: var(--gold2); opacity:.8; margin-top:3px; }
.brand-divider { width: 60px; height: 1px; background: linear-gradient(90deg,transparent,var(--gold),transparent); margin: 14px auto; }
.brand-tag { font-size: 0.8rem; color: rgba(255,255,255,0.6); letter-spacing: 0.12em; margin-bottom: 28px; }

/* Category buttons — black pill grid, like reference screenshots */
.cats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  max-width: 320px;
  margin: 0 auto;
}
.cat-btn {
  background: #111;
  border: none;
  border-radius: 50px;
  padding: 14px 8px;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 0.82rem;
  font-weight: 900;
  letter-spacing: 0.02em;
  text-decoration: underline;
  text-decoration-color: var(--gold);
  text-underline-offset: 3px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  font-style: italic;
}
.cat-btn:hover, .cat-btn.active {
  background: var(--gold);
  color: var(--navy);
  text-decoration-color: var(--navy);
  transform: scale(1.03);
}
.cat-btn.main {
  background: var(--red);
  text-decoration-color: #fff;
}
.cat-btn.main:hover { background: #b81d30; }

/* Social icons in hero */
.social-hero { display: flex; gap: 18px; justify-content: center; margin-top: 30px; }
.social-hero a {
  width: 46px; height: 46px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  text-decoration: none;
  transition: transform 0.2s;
}
.social-hero a:hover { transform: scale(1.1); }
.s-insta { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
.s-whats { background: #25d366; }
.s-face  { background: #1877f2; }

/* ═══ ITEMS SECTION ═══ */
.items-section { display: none; padding: 20px 14px 40px; }
.items-section.active { display: block; }

.section-head {
  text-align: center;
  padding: 10px 0 24px;
  position: relative;
}
.back-btn {
  position: absolute; right: 0; top: 10px;
  background: rgba(224,38,60,0.15);
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: 'Cairo', sans-serif;
  font-size: 0.8rem;
  padding: 6px 14px;
  border-radius: 50px;
  cursor: pointer;
}
.sec-title {
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 0.04em;
}
.sec-divider { width: 50px; height: 1px; background: linear-gradient(90deg,transparent,var(--gold),transparent); margin: 10px auto 0; }

/* ═══ ITEM CARDS — image / price+name / black ORDER NOW bar ═══ */
.item-card {
  background: #f2f2f2;
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 18px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.35);
  display: flex;
  flex-direction: column;
  padding: 14px;
  gap: 12px;
}
.item-img-wrap {
  height: 170px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  overflow: hidden;
  background: #e9e9e9;
}
.item-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.item-text-block { text-align: right; }
.item-price-tag {
  font-size: 1.05rem;
  font-weight: 900;
  color: var(--navy);
  display: inline-flex;
  align-items: baseline;
  gap: 4px;
}
.item-price-tag .unit {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--gold);
}
.item-name-en {
  font-size: 1.3rem;
  font-weight: 900;
  color: #111;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  line-height: 1.15;
  margin-top: 2px;
}
.item-name-ar {
  font-size: 0.85rem;
  color: #777;
  font-weight: 600;
  margin-top: 2px;
}
.order-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 11px 14px;
  font-family: 'Cairo', sans-serif;
  font-size: 0.95rem;
  font-weight: 900;
  font-style: italic;
  letter-spacing: 0.06em;
  cursor: pointer;
  text-decoration: none;
  width: 100%;
  transition: background 0.2s;
}
.order-btn:hover { background: #222; }
.order-btn .wa-icon {
  width: 34px; height: 34px;
  background: var(--green);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

/* ═══ QUICK NAV — grid of other categories at the bottom of each section ═══ */
.quick-nav {
  margin-top: 30px;
  padding-top: 24px;
  border-top: 1px solid rgba(224,38,60,0.25);
}
.quick-nav-title {
  text-align: center;
  color: var(--gold);
  font-weight: 800;
  font-size: 0.95rem;
  margin-bottom: 14px;
  letter-spacing: 0.04em;
}
.quick-nav-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* ═══ FOOTER ═══ */
.site-footer {
  text-align: center;
  padding: 24px 20px;
  border-top: 1px solid rgba(224,38,60,0.15);
  background: #000000;
  color: rgba(255,255,255,0.4);
  font-size: 0.75rem;
  letter-spacing: 0.1em;
}
.site-footer span { color: var(--gold); }
</style>

// WA number — change this later
const WA = 'XXXXXXXXXX';
const WA_MSG = encodeURIComponent('مرحباً، أريد الطلب من لاجونا دبي 🌊');

// ═══ BUILD HERO CATEGORY BUTTONS ═══
function buildHeroCats() {
  const container = document.getElementById('heroCats');
  container.innerHTML = CATS.map(c =>
    `<button class="cat-btn" onclick="showSection('${c.key}')">${c.hero}</button>`
  ).join('');
}

// ═══ BUILD A SINGLE QUICK-NAV GRID (jump to other categories, shown at the bottom of every section) ═══
function buildQuickNavHTML(currentKey) {
  const buttons = [
    `<button class="cat-btn main" onclick="goBack()">القائمة الرئيسية ⬅</button>`,
    ...CATS.filter(c => c.key !== currentKey).map(c =>
      `<button class="cat-btn" onclick="showSection('${c.key}')">${c.hero}</button>`
    )
  ];
  return `
    <div class="quick-nav">
      <div class="quick-nav-title">تصفح أقسام أخرى</div>
      <div class="quick-nav-grid">${buttons.join('')}</div>
    </div>
  `;
}

// ═══ BUILD ALL SECTIONS (header + item cards + quick-nav) ═══
function buildSections() {
  const wrapper = document.getElementById('itemsWrapper');
  wrapper.innerHTML = CATS.map(c => {
    const items = MENU[c.key] || [];
    const cards = items.map(item => `
      <div class="item-card">
        <div class="item-img-wrap">
          <img src="${item.img}" alt="${item.ar}" loading="lazy" onerror="this.style.background='#1a2a3a'">
        </div>
        <div class="item-text-block">
          <div class="item-price-tag">${item.price}<span class="unit"> ج.م</span></div>
          <div class="item-name-en">${item.en}</div>
          <div class="item-name-ar">${item.ar}</div>
        </div>
        <a class="order-btn" href="https://wa.me/${WA}?text=${WA_MSG}%20-%20${encodeURIComponent(item.ar)}" target="_blank">
          <span class="wa-icon">📞</span>
          <span>ORDER NOW</span>
        </a>
      </div>
    `).join('');

    return `
      <div class="items-section" id="sec-${c.key}">
        <div class="section-head">
          <button class="back-btn" onclick="goBack()">↩ رجوع</button>
          <div class="sec-title">${c.title}</div>
          <div class="sec-divider"></div>
        </div>
        <div id="cards-${c.key}">${cards}</div>
        ${buildQuickNavHTML(c.key)}
      </div>
    `;
  }).join('');
}

buildHeroCats();
buildSections();

// ═══ Navigation ═══
const hero = document.getElementById('heroPage');

function showSection(cat) {
  hero.style.display = 'none';
  document.querySelectorAll('.items-section').forEach(s => s.classList.remove('active'));
  const target = document.getElementById('sec-' + cat);
  if (target) {
    target.classList.add('active');
    window.scrollTo(0, 0);
  }
}

function goBack() {
  document.querySelectorAll('.items-section').forEach(s => s.classList.remove('active'));
  hero.style.display = '';
  window.scrollTo(0, 0);
}
