<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C9A84C;--gold-light:#E8D48B;--gold-dark:#A8882E;--whatsapp:#25D366}
html.dark{--bg:#0A0A0F;--bg-card:#121218;--bg-card-hover:#1A1A28;--text-primary:#FFFFFF;--text-muted:#8A8A9A;--nav-bg:rgba(10,10,15,0.94);--header-start:#0A0A0F;--header-end:#121218;--card-border:rgba(255,255,255,0.04);--btn-order-bg:#0A0A0F;--btn-order-border:rgba(255,255,255,0.08);--sec-border:rgba(201,168,76,0.18);--footer-border:rgba(201,168,76,0.08);--nav-border:rgba(201,168,76,0.12);--sc-thumb:rgba(201,168,76,0.3);--shadow:rgba(0,0,0,0.4);--hover-shadow:rgba(0,0,0,0.4);--nav-btn-bg:rgba(255,255,255,0.06);--nav-btn-hover:rgba(255,255,255,0.1)}
html.light{--bg:#F5F0E8;--bg-card:#FFFFFF;--bg-card-hover:#FAFAF5;--text-primary:#1A1A2E;--text-muted:#6B7280;--nav-bg:rgba(255,255,255,0.95);--header-start:#FFFFFF;--header-end:#F5F0E8;--card-border:rgba(0,0,0,0.06);--btn-order-bg:#1A1A2E;--btn-order-border:rgba(0,0,0,0.1);--sec-border:rgba(201,168,76,0.3);--footer-border:rgba(0,0,0,0.06);--nav-border:rgba(0,0,0,0.08);--sc-thumb:rgba(201,168,76,0.4);--shadow:rgba(0,0,0,0.08);--hover-shadow:rgba(0,0,0,0.12);--nav-btn-bg:rgba(0,0,0,0.04);--nav-btn-hover:rgba(0,0,0,0.08)}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;overflow-x:hidden;transition:background 0.3s ease,color 0.3s ease}
.gold-gradient{background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Theme Toggle */
.theme-toggle{position:absolute;top:16px;left:16px;z-index:10;width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);color:var(--text-muted);transition:all 0.3s ease;backdrop-filter:blur(6px)}
.theme-toggle:hover{background:rgba(255,255,255,0.15);transform:rotate(15deg)}

/* Header */
.header{position:relative;padding:50px 20px 32px;text-align:center;overflow:hidden;background:linear-gradient(180deg,var(--header-start),var(--header-end));transition:background 0.3s ease}
.header::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.08) 0%,transparent 70%);pointer-events:none}
.header-content{position:relative;z-index:1}
.logo-svg{width:80px;height:80px;margin:0 auto 16px;display:block}
.header h1{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,5vw,2.5rem);font-weight:900;letter-spacing:3px;text-transform:uppercase}
.header .tagline{font-size:clamp(0.75rem,2.5vw,1rem);color:var(--text-muted);letter-spacing:6px;margin-top:4px;font-weight:300;transition:color 0.3s ease}
.header .gold-line{width:50px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto;border-radius:2px}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--nav-border);padding:6px 4px;direction:ltr;transition:background 0.3s ease,border-color 0.3s ease}
.nav-inner{display:flex;justify-content:center;gap:5px;max-width:800px;margin:0 auto;overflow-x:auto;padding:2px}
.nav-inner::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:7px 12px;border-radius:100px;background:var(--nav-btn-bg);color:var(--text-muted);border:1px solid transparent;font-family:'Cairo',sans-serif;font-size:clamp(0.6rem,1.4vw,0.75rem);font-weight:700;cursor:pointer;transition:all 0.3s ease;white-space:nowrap;letter-spacing:0.5px;text-transform:uppercase}
.nav-btn.active{background:var(--text-primary);color:var(--bg);border-color:var(--gold);box-shadow:0 4px 20px rgba(201,168,76,0.2)}
.nav-btn:hover:not(.active){background:var(--nav-btn-hover);color:var(--text-primary)}

/* Container */
.container{max-width:900px;margin:0 auto;padding:24px 12px 90px}

/* Section */
.section{display:none}
.section.active{display:block;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.section-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--sec-border);transition:border-color 0.3s ease}
.section-header .icon{font-size:1.4rem}
.section-header h2{font-family:'Playfair Display',serif;font-size:clamp(1rem,2.8vw,1.4rem);font-weight:700;color:var(--text-primary);letter-spacing:1px}

/* Cards */
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.menu-card{background:var(--bg-card);border-radius:14px;overflow:hidden;border:1px solid var(--card-border);transition:all 0.35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.menu-card:hover{transform:translateY(-3px);background:var(--bg-card-hover);box-shadow:0 14px 40px var(--shadow)}

/* ---- IMAGE SYSTEM ---- */
.card-img-wrap{position:relative;width:100%;padding-top:58%;overflow:hidden}
.card-img-wrap .ci-bg{position:absolute;top:0;left:0;width:100%;height:100%;transition:transform 0.6s ease}
.menu-card:hover .ci-bg{transform:scale(1.06)}
.card-img-wrap .ci-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:4rem;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));transition:transform 0.5s ease;z-index:2;pointer-events:none;line-height:1}
.menu-card:hover .ci-icon{transform:translate(-50%,-50%) scale(1.12)}
.card-img-wrap .ci-overlay{position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(transparent 0%,rgba(0,0,0,0.7) 100%);z-index:1}
.card-img-wrap .ci-label{position:absolute;bottom:10px;right:12px;z-index:3;color:rgba(255,255,255,0.9);font-size:0.7rem;font-weight:600;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);padding:2px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);letter-spacing:0.5px;text-transform:uppercase}
.card-img-wrap img.ci-real{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.card-img-wrap .ci-real + .ci-overlay{background:linear-gradient(transparent 30%,rgba(0,0,0,0.8) 100%)}
.card-img-wrap .ci-real ~ .ci-icon{display:none}
/* ---- END IMAGE SYSTEM ---- */

.card-body{padding:14px 16px 16px;flex:1;display:flex;flex-direction:column}
.card-body .item-name{font-size:1rem;font-weight:700;color:var(--text-primary);line-height:1.3;transition:color 0.3s ease}
.card-body .item-name .sub{display:block;font-size:0.72rem;font-weight:400;color:var(--text-muted);margin-top:2px}
.card-body .item-price{font-size:1.2rem;font-weight:900;color:var(--gold);margin-top:4px}
.card-body .item-price .curr{font-size:0.6rem;font-weight:600;color:var(--text-muted);margin-right:2px}
.card-actions{margin-top:10px;display:flex;gap:8px}
.btn-order{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:9px 12px;border-radius:10px;background:var(--btn-order-bg);color:#fff;border:1px solid var(--btn-order-border);font-family:'Cairo',sans-serif;font-size:0.78rem;font-weight:700;cursor:pointer;transition:all 0.3s ease;text-decoration:none}
.btn-order:hover{background:var(--btn-order-bg);border-color:var(--whatsapp);box-shadow:0 0 20px rgba(37,211,102,0.15)}
.btn-order .wa-icon{width:16px;height:16px;flex-shrink:0}
.btn-order .wa-icon svg{width:100%;height:100%;fill:var(--whatsapp)}

/* Footer */
.footer{margin-top:10px;padding:20px 16px;border-top:1px solid var(--footer-border);text-align:center;transition:border-color 0.3s ease}
.footer-inner{max-width:800px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:center;gap:6px 18px;font-size:0.7rem;color:var(--text-muted);font-weight:400}
.footer-inner a{color:var(--text-muted);text-decoration:none;transition:color 0.3s}
.footer-inner a:hover{color:var(--gold)}
.footer .brand{color:var(--gold-light);font-weight:600}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sc-thumb);border-radius:4px}

@media(max-width:480px){
.theme-toggle{top:12px;left:12px;width:32px;height:32px;font-size:1rem}
}
@media(min-width:640px){
.menu-grid{grid-template-columns:repeat(2,1fr)}
.container{padding:30px 18px 90px}
}
@media(min-width:900px){
.menu-grid{grid-template-columns:repeat(3,1fr)}
.container{padding:36px 20px 90px}
}
</style>
</head>

};

function hashStr(s) {
let h = 0;
for (let i = 0; i < s.length; i++) {
h = ((h << 5) - h) + s.charCodeAt(i);
h |= 0;
}
return Math.abs(h);
}

function getItemGradient(item, catKey) {
const palette = CATEGORY_PALETTES[catKey];
if (!palette) return ['#1A1A28','#0A0A0F'];
const h = hashStr(item.name);
const c1 = palette[0][h % palette[0].length];
const c2 = palette[1][(h + 7) % palette[1].length];
const angle = (h % 360).toString();
const c1s = '#' + c1.toString(16).padStart(6,'0');
const c2s = '#' + c2.toString(16).padStart(6,'0');
return { c1: c1s, c2: c2s, angle };
}

function getItemImageHTML(item, catKey) {
if (item.image) {
return `<img class="ci-real" src="${item.image}" alt="${item.name}" loading="lazy" />`;
}
const g = getItemGradient(item, catKey);
return `
<div class="ci-bg" style="background:linear-gradient(${g.angle}deg,${g.c1},${g.c2})"></div>
<div class="ci-icon">${item.img}</div>
<div class="ci-overlay"></div>
<span class="ci-label">${catKey === 'MAIN MENU' ? 'SIGNATURE' : catKey}</span>
`;
}
